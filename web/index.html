<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fangeleg</title>
    <style>
      body {
        background: #020617;
        color: #e5e7eb;
        font-family: system-ui, sans-serif;
      }

      canvas {
        border: 1px solid #475569;
      }
    </style>
  </head>
  <body>
    <h1>Fangeleg</h1>
    <canvas id="simulation"></canvas>

    <script type="module">
      import init, { WasmSimulation, stayAction, moveAction, tagAction } from "../bindgen-out/fangeleg_wasm.js";

      await init();

      // An example JsAgent that always tags the first taggable position, or moves down if none are available
      function jsAgentExample(input) {
          const position = input.position;

          // If there are taggable positions, take the first one
          if (input.taggablePositionCount() > 0) {
              const target = input.taggablePositionAt(0);

              return tagAction(target.x, target.y);
          }

          // Otherwise move down
          return moveAction(position.x, position.y+1);
      }

      // A lazy JsAgent that always stays in place
      function lazyJsAgent(input) {
          return stayAction();
      }

      const sim = new WasmSimulation("simulation", 30, 30, 40, 20);

      sim.place_js_agent(0, 0, jsAgentExample);
      sim.place_js_agent(0, 6, lazyJsAgent);

      setInterval(() => {
        sim.step();
      }, 150);
    </script>
  </body>
</html>
